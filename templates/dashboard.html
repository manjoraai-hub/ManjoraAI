<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            background:
            linear-gradient(
            135deg,
            #6a11cb,
            #2575fc);

        }

        .dashboard{

            width:85%;

            max-width:1200px;

            background:rgba(255,255,255,0.18);

            backdrop-filter:blur(20px);

            border-radius:35px;

            padding:50px;

            box-shadow:
            0 8px 40px rgba(0,0,0,0.25);
        }

        .dashboard h1{

            text-align:center;

            color:white;

            font-size:70px;

            margin-bottom:50px;
        }

        .cards{

            display:grid;

            grid-template-columns:
            repeat(auto-fit,minmax(280px,1fr));

            gap:30px;
        }

        .card{

            background:rgba(255,255,255,0.18);

            border-radius:25px;

            padding:40px;

            text-align:center;

            color:white;

            transition:0.3s;

            text-decoration:none;

            box-shadow:
            0 4px 20px rgba(0,0,0,0.2);
        }

        .card:hover{

            transform:translateY(-10px)
            scale(1.03);

            background:rgba(255,255,255,0.25);
        }

        .icon{

            font-size:45px;

            margin-bottom:20px;
        }

        .card h2{

            font-size:42px;

            line-height:1.3;
        }

        @media(max-width:768px){

            .dashboard{

                width:95%;

                padding:30px;
            }

            .dashboard h1{

                font-size:45px;
            }

            .card h2{

                font-size:30px;
            }

        }

    </style>

</head>

<body>

<div class="dashboard">

    <h1>

        🎓 Student Dashboard

    </h1>

    <div class="cards">

        <a href="/books"
        class="card">

            <div class="icon">

                📚

            </div>

            <h2>

                Book Recommendations

            </h2>

        </a>

        <a href="/planner"
        class="card">

            <div class="icon">

                🧠

            </div>

            <h2>

                AI Study Planner

            </h2>

        </a>

        <a href="/career"
        class="card">

            <div class="icon">

                🎯

            </div>

            <h2>

                Career Guidance

            </h2>

        </a>

        <a href="/affairs"
        class="card">

            <div class="icon">

                📰

            </div>

            <h2>

                Current Affairs

            </h2>

        </a>

    </div>

</div>

</body>

</html>
