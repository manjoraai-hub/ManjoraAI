<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Study Planner - Manjora AI</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <nav class="navbar">

        <h2>📚 Manjora AI</h2>

        <div>

            <a href="/">Home</a>

            <a href="/dashboard">Dashboard</a>

            <a href="/chatbot">AI Mentor</a>

        </div>

    </nav>

    <div class="container">

        <h1>

            Smart Study Planner

        </h1>

        <p>

            Plan your daily study goals effectively.

        </p>

        <input
            type="text"
            id="taskInput"
            placeholder="Enter study task...">

        <button onclick="addTask()">

            Add Task

        </button>

        <div id="taskList">

        </div>

    </div>

    <script>

        function addTask(){

            let input =
                document.getElementById("taskInput");

            let task = input.value;

            if(task.trim() === "") return;

            let taskList =
                document.getElementById("taskList");

            taskList.innerHTML +=
                `<div class="planner-task">
                    ✅ ${task}
                </div>`;

            input.value = "";
        }

    </script>

</body>

</html>
