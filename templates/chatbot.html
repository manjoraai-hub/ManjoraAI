<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>AI Mentor - Manjora AI</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <nav class="navbar">

        <h2>🤖 Manjora AI</h2>

        <div>

            <a href="/">Home</a>

            <a href="/dashboard">Dashboard</a>

            <a href="/planner">Planner</a>

        </div>

    </nav>

    <div class="container">

        <h1>

            AI Mentor Chatbot

        </h1>

        <p>

            Ask doubts, get guidance and learn smarter.

        </p>

        <div id="chatBox">

            <div class="bot-chat">

                👋 Hello! I am your AI Mentor.

            </div>

        </div>

        <input
            type="text"
            id="userInput"
            placeholder="Ask something...">

        <button onclick="sendMessage()">

            Send

        </button>

    </div>

    <script>

        function sendMessage(){

            let input =
                document.getElementById("userInput");

            let message = input.value;

            if(message.trim() === "") return;

            let chatBox =
                document.getElementById("chatBox");

            chatBox.innerHTML +=
                `<div class="user-chat">
                    ${message}
                </div>`;

            setTimeout(() => {

                chatBox.innerHTML +=
                    `<div class="bot-chat">
                        AI Mentor is thinking...
                    </div>`;

                chatBox.scrollTop =
                    chatBox.scrollHeight;

            }, 500);

            input.value = "";

            chatBox.scrollTop =
                chatBox.scrollHeight;
        }

    </script>

</body>

</html>
