<!DOCTYPE html>
<html>

<head>

    <title>Manjora AI Chatbot</title>

    <style>

        body{

            font-family:Arial;
            background:#0f172a;
            color:white;
            margin:0;
            padding:0;

        }

        .container{

            width:80%;
            max-width:700px;
            margin:40px auto;
            background:#1e293b;
            padding:20px;
            border-radius:15px;

        }

        h1{

            text-align:center;

        }

        #chat-box{

            height:400px;
            overflow-y:auto;
            background:#111827;
            padding:15px;
            border-radius:10px;
            margin-bottom:15px;

        }

        .user{

            text-align:right;
            margin:10px;

        }

        .bot{

            text-align:left;
            margin:10px;

        }

        input{

            width:75%;
            padding:12px;
            border:none;
            border-radius:8px;

        }

        button{

            padding:12px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>🤖 Manjora AI</h1>

    <div id="chat-box"></div>

    <input type="text" id="message" placeholder="Type message...">

    <button onclick="sendMessage()">Send</button>

</div>

<script>

async function sendMessage(){

    let messageInput = document.getElementById("message");

    let message = messageInput.value;

    if(message === ""){

        return;

    }

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `
        <div class="user">
            <b>You:</b> ${message}
        </div>
    `;

    messageInput.value = "";

    try{

        let response = await fetch("/ask_ai",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:message
            })

        });

        let data = await response.json();

        chatBox.innerHTML += `
            <div class="bot">
                <b>AI:</b> ${data.reply}
            </div>
        `;

    }

    catch(error){

        chatBox.innerHTML += `
            <div class="bot">
                <b>AI:</b> Error connecting server.
            </div>
        `;

    }

    chatBox.scrollTop = chatBox.scrollHeight;

}

</script>

</body>

</html>
