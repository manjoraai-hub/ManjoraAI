<!DOCTYPE html>
<html>

<head>
    <title>Manjora AI Chatbot</title>

    <style>

        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:linear-gradient(135deg,#0f172a,#1e3a8a);
            color:white;
        }

        .chat-container{

            width:80%;
            max-width:900px;
            margin:40px auto;
            background:#1e293b;
            border-radius:20px;
            padding:20px;
            box-shadow:0px 0px 20px rgba(0,0,0,0.4);

        }

        h1{

            text-align:center;
            margin-bottom:20px;

        }

        #chat-box{

            height:500px;
            overflow-y:auto;
            padding:15px;
            background:#0f172a;
            border-radius:15px;
            margin-bottom:20px;

        }

        .user-message{

            text-align:right;
            margin:10px;

        }

        .user-message span{

            background:#ff4b2b;
            padding:12px 18px;
            border-radius:15px;
            display:inline-block;

        }

        .bot-message{

            text-align:left;
            margin:10px;

        }

        .bot-message span{

            background:#2563eb;
            padding:12px 18px;
            border-radius:15px;
            display:inline-block;

        }

        .input-area{

            display:flex;
            gap:10px;

        }

        #user-input{

            flex:1;
            padding:15px;
            border:none;
            border-radius:10px;
            font-size:16px;

        }

        button{

            background:#ff4b2b;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;

        }

        button:hover{

            background:#ff416c;

        }

    </style>

</head>

<body>

    <div class="chat-container">

        <h1>🚀 Manjora AI Mentor</h1>

        <div id="chat-box">

            <div class="bot-message">
                <span>👋 Hello! I am Manjora AI.</span>
            </div>

        </div>

        <div class="input-area">

            <input type="text" id="user-input" placeholder="Ask anything...">

            <button onclick="sendMessage()">Send</button>

        </div>

    </div>

<script>

async function sendMessage(){

    let input = document.getElementById("user-input");

    let message = input.value;

    if(message.trim() === ""){

        return;

    }

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `

        <div class="user-message">
            <span>${message}</span>
        </div>

    `;

    input.value = "";

    chatBox.innerHTML += `

        <div class="bot-message" id="thinking">
            <span>Manjora AI is thinking...</span>
        </div>

    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try{

        let response = await fetch("/ask_ai",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                message:message
            })

        });

        let data = await response.json();

        document.getElementById("thinking").remove();

        chatBox.innerHTML += `

            <div class="bot-message">
                <span>${data.reply}</span>
            </div>

        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    }

    catch(error){

        document.getElementById("thinking").remove();

        chatBox.innerHTML += `

            <div class="bot-message">
                <span>⚠️ Error connecting to AI server.</span>
            </div>

        `;

    }

}

</script>

</body>

</html>
