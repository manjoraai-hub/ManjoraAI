<!DOCTYPE html>
<html>

<head>

    <title>Current Affairs</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <h1 style="
    text-align:center;
    margin-top:40px;
    font-size:60px;">

        📰 Current Affairs

    </h1>

    <!-- WORKING BUTTON -->

    <div style="text-align:center;">

        <a href="/affairs"
        class="btn">

            Load Latest News

        </a>

    </div>

    <!-- NEWS SECTION -->

    <div class="dashboard-grid"
    style="margin-top:50px;">

        {% if articles %}

            {% for article in articles %}

            <div class="dashboard-card">

                {% if article.urlToImage %}

                <img src="{{ article.urlToImage }}"
                style="
                width:100%;
                height:220px;
                object-fit:cover;
                border-radius:15px;">

                {% endif %}

                <h2 style="
                margin-top:20px;">

                    {{ article.title }}

                </h2>

                <p style="
                margin-top:15px;
                line-height:1.6;">

                    {{ article.description }}

                </p>

                <a href="{{ article.url }}"
                target="_blank"
                class="btn">

                    Read More

                </a>

            </div>

            {% endfor %}

        {% else %}

            <h2 style="
            text-align:center;">

                ❌ No news available

            </h2>

        {% endif %}

    </div>

</div>

</body>

</html>
