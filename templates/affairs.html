<!DOCTYPE html>
<html>

<head>

    <title>Current Affairs</title>

    <style>

        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            margin:0;
            padding:40px;
        }

        h1{
            text-align:center;
            color:#38bdf8;
            font-size:55px;
        }

        .news-container{
            display:grid;
            grid-template-columns:
            repeat(auto-fit,minmax(300px,1fr));
            gap:25px;
            margin-top:50px;
        }

        .news-card{
            background:#1e293b;
            border-radius:20px;
            padding:20px;
        }

        .news-card img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:15px;
        }

        .news-card h2{
            color:#38bdf8;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            padding:10px 18px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:10px;
        }

    </style>

</head>

<body>

<h1>

    📰 Live Current Affairs

</h1>

<div class="news-container">

    {% for article in articles %}

    <div class="news-card">

        <img src="{{ article.image }}">

        <h2>

            {{ article.title }}

        </h2>

        <p>

            {{ article.description }}

        </p>

        <a href="{{ article.url }}"
        target="_blank"
        class="btn">

            Read More

        </a>

    </div>

    {% endfor %}

</div>

</body>

</html>
