<!DOCTYPE html>
<html>

<head>

    <title>Manjora AI | Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(15,23,42,0.85),
            rgba(15,23,42,0.9)),

            url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600');

            background-size:cover;
            background-position:center;

            overflow:hidden;

        }

        .login-container{

            width:90%;
            max-width:480px;

            background:rgba(30,41,59,0.92);

            backdrop-filter:blur(12px);

            padding:45px;

            border-radius:25px;

            box-shadow:
            0px 0px 40px rgba(0,0,0,0.5);

            text-align:center;

            animation:fadeIn 1s ease;

        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(40px);
            }

            to{
                opacity:1;
                transform:translateY(0px);
            }

        }

        .logo{

            font-size:60px;
            margin-bottom:10px;

        }

        h1{

            color:#38bdf8;
            font-size:48px;
            margin-bottom:10px;

        }

        .subtitle{

            color:#cbd5e1;
            margin-bottom:35px;
            font-size:20px;

        }

        .input-box{

            width:100%;
            margin-top:20px;

        }

        .input-box input{

            width:100%;

            padding:18px;

            border:none;

            outline:none;

            border-radius:14px;

            background:#0f172a;

            color:white;

            font-size:17px;

        }

        .btn{

            width:100%;

            padding:18px;

            margin-top:30px;

            border:none;

            border-radius:14px;

            background:#2563eb;

            color:white;

            font-size:20px;

            cursor:pointer;

            transition:0.3s;

        }

        .btn:hover{

            background:#1d4ed8;
            transform:scale(1.03);

        }

        .extra{

            margin-top:25px;
            color:#cbd5e1;
            font-size:17px;

        }

        .extra a{

            color:#38bdf8;
            text-decoration:none;

        }

        .features{

            margin-top:35px;
            text-align:left;

            background:#0f172a;
            padding:20px;
            border-radius:15px;

        }

        .features h3{

            margin-bottom:15px;
            color:#38bdf8;

        }

        .features p{

            margin-top:12px;
            color:#e2e8f0;
            font-size:17px;

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="logo">

        🚀

    </div>

    <h1>Manjora AI</h1>

    <p class="subtitle">

        Smart Learning & Productivity Platform

    </p>

    <form action="/dashboard">

        <div class="input-box">

            <input type="text"
            placeholder="Enter Username"
            required>

        </div>

        <div class="input-box">

            <input type="password"
            placeholder="Enter Password"
            required>

        </div>

        <button class="btn">

            Login

        </button>

    </form>

    <div class="extra">

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </div>

    <div class="features">

        <h3>✨ Platform Features</h3>

        <p>✅ Daily Study Planner</p>

        <p>✅ UPSC Learning Hub</p>

        <p>✅ Career Roadmaps</p>

        <p>✅ Books & YouTube Lectures</p>

        <p>✅ Productivity Dashboard</p>

        <p>✅ Smart Educational Resources</p>

    </div>

</div>

</body>
</html>
