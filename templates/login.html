<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Manjora AI</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="auth-container">

        <div class="auth-card">

            <h1>🔐 Login</h1>

            <p>Welcome back to Manjora AI</p>

            <form action="/login_user" method="POST">

                <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter Password"
                    required>

                <button type="submit">

                    Login

                </button>

            </form>

            <p class="auth-link">

                Don't have an account?

                <a href="/register">

                    Register

                </a>

            </p>

        </div>

    </div>

</body>

</html>
