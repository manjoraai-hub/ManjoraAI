<!DOCTYPE html>
<html>

<head>

    <title>Manjora AI | Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{

            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(15,23,42,0.8),
            rgba(15,23,42,0.9)),
            url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1600');

            background-size:cover;
            background-position:center;

        }

        .login-container{

            width:90%;
            max-width:420px;

            background:rgba(30,41,59,0.9);

            backdrop-filter:blur(10px);

            padding:40px;

            border-radius:25px;

            box-shadow:
            0px 0px 30px rgba(0,0,0,0.5);

            text-align:center;

            animation:fadeIn 1s ease;

        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0px);
            }

        }

        .logo{

            font-size:55px;
            margin-bottom:15px;

        }

        h1{

            color:#38bdf8;
            margin-bottom:10px;
            font-size:40px;

        }

        p{

            color:#cbd5e1;
            margin-bottom:30px;

        }

        .input-box{

            width:100%;
            margin-top:20px;

        }

        .input-box input{

            width:100%;

            padding:16px;

            border:none;

            outline:none;

            border-radius:12px;

            background:#0f172a;

            color:white;

            font-size:16px;

        }

        .btn{

            width:100%;

            padding:16px;

            margin-top:25px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;

        }

        .btn:hover{

            background:#1d4ed8;
            transform:scale(1.03);

        }

        .extra{

            margin-top:20px;
            color:#cbd5e1;

        }

        .extra a{

            color:#38bdf8;
            text-decoration:none;

        }

        .features{

            margin-top:30px;
            text-align:left;

        }

        .features p{

            margin-top:10px;
            color:#e2e8f0;

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="logo">

        🚀

    </div>

    <h1>Manjora AI</h1>

    <p>
        Your Smart Learning & Productivity Platform
    </p>

    <form action="/dashboard">

        <div class="input-box">

            <input type="email"
            placeholder="Enter Email"
            required>

        </div>

        <div class="input-box">

            <input type="password"
            placeholder="Enter Password"
            required>

        </div>

        <button class="btn">

            Login

        </button>

    </form>

    <div class="extra">

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </div>

    <div class="features">

        <p>✅ Study Planner</p>
        <p>✅ UPSC Learning Hub</p>
        <p>✅ Career Roadmaps</p>
        <p>✅ Books & Lectures</p>
        <p>✅ Productivity Dashboard</p>

    </div>

</div>

</body>
</html>
