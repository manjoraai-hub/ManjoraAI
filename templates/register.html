<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Register | Manjora AI</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<style>

.register-box{

width:90%;

max-width:450px;

margin:80px auto;

background:rgba(255,255,255,0.08);

padding:40px;

border-radius:25px;

text-align:center;
}

.register-box h1{

color:#38bdf8;

margin-bottom:25px;
}

</style>

</head>

<body>

<div class="register-box">

<h1>

📝 Register

</h1>

<form method="POST">

<input type="text"
name="username"
placeholder="Enter Username"
required>

<br><br>

<input type="password"
name="password"
placeholder="Enter Password"
required>

<br><br>

<button type="submit">

Create Account

</button>

</form>

<br>

<a href="/login"
class="btn">

Login

</a>

</div>

</body>

</html>
