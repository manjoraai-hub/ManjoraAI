<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Manjora AI | Register</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{

            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(rgba(15,23,42,0.85),
            rgba(15,23,42,0.92)),

            url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1600');

            background-size:cover;
            background-position:center;

        }

        .register-box{

            width:90%;
            max-width:450px;

            background:rgba(30,41,59,0.95);

            padding:40px;

            border-radius:20px;

            box-shadow:
            0px 0px 30px rgba(0,0,0,0.4);

            text-align:center;

        }

        .logo{

            font-size:60px;
            margin-bottom:10px;

        }

        h1{

            color:#38bdf8;
            margin-bottom:10px;
            font-size:42px;

        }

        .subtitle{

            color:#cbd5e1;
            margin-bottom:30px;
            font-size:18px;

        }

        .input-group{

            margin-top:20px;

        }

        .input-group input{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:#0f172a;

            color:white;

            font-size:16px;

            outline:none;

        }

        .register-btn{

            width:100%;

            margin-top:25px;

            padding:16px;

            border:none;

            border-radius:12px;

            background:#2563eb;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:0.3s;

        }

        .register-btn:hover{

            background:#1d4ed8;

        }

        .login-link{

            margin-top:20px;
            color:#cbd5e1;

        }

        .login-link a{

            color:#38bdf8;
            text-decoration:none;

        }

    </style>

</head>

<body>

    <div class="register-box">

        <div class="logo">🚀</div>

        <h1>Create Account</h1>

        <p class="subtitle">

            Join Manjora AI and track your learning progress

        </p>

        <!-- REGISTER FORM -->

        <form method="POST">

            <div class="input-group">

                <input type="text"
                name="username"
                placeholder="Create Username"
                required>

            </div>

            <div class="input-group">

                <input type="password"
                name="password"
                placeholder="Create Password"
                required>

            </div>

            <button type="submit"
            class="register-btn">

                Register

            </button>

        </form>

        <div class="login-link">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </div>

    </div>

</body>

</html>
